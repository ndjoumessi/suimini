# Sauvegarde quotidienne de la base Supabase (Free tier — pas de pg_dump direct) :
# export JSON de chaque table via la Management API, stocké en artifact GitHub 30 j.
#
# Secrets repo à configurer (Settings → Secrets and variables → Actions) :
#   SUPABASE_ACCESS_TOKEN  — Personal Access Token (https://supabase.com/dashboard/account/tokens)
#   SUPABASE_PROJECT_ID    — ref du projet (l'identifiant dans l'URL du dashboard)
# Optionnels (notification d'échec par email) :
#   RESEND_API_KEY, BACKUP_ALERT_EMAIL
#
# Restauration : les fichiers backup-<table>-<date>.json contiennent un tableau
# JSON de lignes complètes (y compris tombstones deleted_at et owner_id) —
# réinjectables via le SQL Editor (jsonb_populate_recordset) ou un script ad hoc.
name: Daily DB Backup

on:
  schedule:
    - cron: '0 2 * * *' # 2h UTC chaque nuit
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Export tables (Supabase Management API)
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
        run: |
          set -euo pipefail
          if [ -z "${SUPABASE_ACCESS_TOKEN:-}" ] || [ -z "${SUPABASE_PROJECT_ID:-}" ]; then
            echo "::error::Secrets SUPABASE_ACCESS_TOKEN / SUPABASE_PROJECT_ID manquants."
            exit 1
          fi
          stamp="$(date -u +%Y%m%d)"
          # Toutes les lignes, tombstones incluses (une sauvegarde doit permettre de
          # restaurer aussi une suppression malencontreuse — architecture soft-delete).
          for table in trees persons relationships journal_entries tree_shares profiles; do
            echo "→ export public.${table}"
            curl --fail -sS -X POST \
              "https://api.supabase.com/v1/projects/${SUPABASE_PROJECT_ID}/database/query" \
              -H "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "{\"query\": \"select coalesce(json_agg(t), '[]'::json) as rows from public.${table} t\"}" \
              -o "backup-${table}-${stamp}.json"
            # Sanity : fichier non vide et JSON parsable.
            [ -s "backup-${table}-${stamp}.json" ] || { echo "::error::Export ${table} vide"; exit 1; }
            python3 -c "import json,sys; json.load(open('backup-${table}-${stamp}.json'))" \
              || { echo "::error::Export ${table} n'est pas du JSON valide"; exit 1; }
          done
          ls -la backup-*.json

      - name: Upload backup artifact (30 jours)
        uses: actions/upload-artifact@v4
        with:
          name: suimini-backup-${{ github.run_id }}
          path: backup-*.json
          retention-days: 30
          if-no-files-found: error

      - name: Notify on failure (Resend)
        if: failure()
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          BACKUP_ALERT_EMAIL: ${{ secrets.BACKUP_ALERT_EMAIL }}
        run: |
          if [ -z "${RESEND_API_KEY:-}" ] || [ -z "${BACKUP_ALERT_EMAIL:-}" ]; then
            echo "RESEND_API_KEY / BACKUP_ALERT_EMAIL absents — notification email sautée."
            exit 0
          fi
          curl -sS -X POST https://api.resend.com/emails \
            -H "Authorization: Bearer ${RESEND_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "{
              \"from\": \"Suimini Backup <onboarding@resend.dev>\",
              \"to\": [\"${BACKUP_ALERT_EMAIL}\"],
              \"subject\": \"[Suimini] Échec du backup quotidien\",
              \"text\": \"Le backup Supabase du $(date -u +%Y-%m-%d) a échoué. Voir le run : ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"
            }"
