name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      - run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}

  e2e:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      - name: Install Playwright
        run: npx playwright install chromium --with-deps
      - name: Start server
        run: npx next start &
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      - name: Wait for server
        run: npx wait-on http://localhost:3000 --timeout 30000
      - name: Run E2E tests
        run: npx playwright test e2e/smoke.spec.ts e2e/auth.spec.ts e2e/dashboard.spec.ts e2e/navigation.spec.ts e2e/tree.spec.ts
        env:
          # Point Playwright at the already-running `next start` server so its
          # config skips spawning its own dev server (avoids a port-3000 clash).
          E2E_BASE_URL: http://localhost:3000
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      - name: Run design-review screenshot captures
        # Not assertion-heavy (the point is the screenshots, uploaded below for
        # review) — but every wait is a real `expect(...).toBeVisible()`, no
        # longer gated behind `test.skip(!!process.env.CI)`. A genuine break
        # still fails the job instead of silently passing.
        run: npx playwright test e2e/dashboard-screenshot.spec.ts e2e/feature-screenshots.spec.ts e2e/feature-screenshots-2.spec.ts
        env:
          E2E_BASE_URL: http://localhost:3000
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      - name: Upload design-review screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: design-review-screenshots
          path: |
            dashboard.png
            shot-*.png
          retention-days: 30
          if-no-files-found: warn
      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

  eas-build:
    # Vérifie l'app mobile (mobile/) sur push main : type-check uniquement.
    # Le build EAS reste MANUEL (eas build -p android|ios --profile …) — pas en CI.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: mobile/package-lock.json
      - run: npm install -g eas-cli
      - name: Install mobile deps
        working-directory: mobile
        run: npm ci
      - name: Type-check mobile
        working-directory: mobile
        run: npx tsc --noEmit
