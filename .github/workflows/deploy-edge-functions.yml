# Déploiement AUTOMATIQUE des Edge Functions Supabase au push sur `main`.
# Remplace le `supabase functions deploy … --no-verify-jwt` manuel.
#
# Secrets repo requis (Settings → Secrets and variables → Actions) — LES MÊMES
# que backup-db.yml, déjà présents :
#   SUPABASE_ACCESS_TOKEN  — Personal Access Token (https://supabase.com/dashboard/account/tokens)
#   SUPABASE_PROJECT_ID    — ref du projet
#
# ⚠️ Secrets d'EXÉCUTION de la fonction (CRON_SECRET, injectés SUPABASE_URL /
#    SERVICE_ROLE_KEY) : gérés à part via `supabase secrets set …` (une seule fois)
#    — ce workflow ne déploie que le CODE. Voir supabase/birthday-cron.sql.
#
# Ne se déclenche que quand la fonction (ou ce workflow) change → aucun déploiement
# inutile. `--no-verify-jwt` : la fonction est protégée par CRON_SECRET (Bearer),
# pas par un JWT utilisateur (elle est appelée par pg_cron).
name: Deploy Edge Functions

on:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/**'
      - '.github/workflows/deploy-edge-functions.yml'
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Guard — secrets présents ?
        id: guard
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
        run: |
          set -euo pipefail
          if [ -z "${SUPABASE_ACCESS_TOKEN:-}" ] || [ -z "${SUPABASE_PROJECT_ID:-}" ]; then
            echo "::warning::SUPABASE_ACCESS_TOKEN / SUPABASE_PROJECT_ID absents — déploiement des Edge Functions sauté (non bloquant)."
            echo "ready=false" >> "$GITHUB_OUTPUT"
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Supabase CLI
        if: steps.guard.outputs.ready == 'true'
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy send-birthday-notifications
        if: steps.guard.outputs.ready == 'true'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
        run: |
          set -euo pipefail
          supabase functions deploy send-birthday-notifications \
            --project-ref "${SUPABASE_PROJECT_ID}" \
            --no-verify-jwt
          echo "✅ Edge Function send-birthday-notifications déployée."
