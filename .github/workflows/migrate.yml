# Application AUTOMATIQUE des migrations de schéma au push sur `main`.
# Remplace le « copier/coller dans le SQL Editor » manuel.
#
# Secrets repo requis (les MÊMES que backup-db.yml, déjà présents) :
#   SUPABASE_ACCESS_TOKEN  — Personal Access Token
#   SUPABASE_PROJECT_ID    — ref du projet
#
# Backend : Management API (l'app n'a que l'anon key → pas de DDL au runtime ;
# la CI est le seul endroit privilégié, jamais de service_role dans l'app).
# Ne se déclenche que quand une migration (ou le runner) change.
name: Apply DB Migrations

on:
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/**'
      - 'scripts/migrate.mjs'
      - '.github/workflows/migrate.yml'
  workflow_dispatch:
    inputs:
      command:
        description: "Commande (up = applique | baseline = marque appliqué sans exécuter | status)"
        default: up
        type: choice
        options: [up, baseline, status]

permissions:
  contents: read

jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Guard — secrets présents ?
        id: guard
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
        run: |
          set -euo pipefail
          if [ -z "${SUPABASE_ACCESS_TOKEN:-}" ] || [ -z "${SUPABASE_PROJECT_ID:-}" ]; then
            echo "::warning::SUPABASE_ACCESS_TOKEN / SUPABASE_PROJECT_ID absents — migrations sautées (non bloquant)."
            echo "ready=false" >> "$GITHUB_OUTPUT"
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node 22
        if: steps.guard.outputs.ready == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Apply migrations (status → command)
        if: steps.guard.outputs.ready == 'true'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
          # push → 'up' ; workflow_dispatch → choix (up|baseline|status). Valeur de
          # liste déroulante (sûre), passée par env par prudence.
          COMMAND: ${{ github.event.inputs.command || 'up' }}
        run: |
          set -euo pipefail
          node scripts/migrate.mjs status
          node scripts/migrate.mjs "$COMMAND"
