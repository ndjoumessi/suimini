<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!-- iOS splash master (redesign 2026-07-14) — Marine Deep canvas, the same
       seal geometry as src/components/Brand.tsx (scaled ×9.375 from its
       32-unit grid), "Suimini" wordmark + tagline below. This square is
       scaled to cover each device's exact pixel size and center-cropped by
       scripts/generate-splash.mjs — keep the mark/wordmark near the vertical
       center (~40-60%) so the crop never clips them on tall/narrow phones. -->
  <defs>
    <radialGradient id="bg" cx="50%" cy="30%" r="85%">
      <stop offset="0%" stop-color="#1e3040"/>
      <stop offset="100%" stop-color="#0f1a24"/>
    </radialGradient>
  </defs>
  <rect width="1024" height="1024" fill="url(#bg)"/>

  <g transform="translate(362 280) scale(9.375)">
    <rect x="6.3" y="6.3" width="19.4" height="19.4" rx="4" ry="4" fill="#26374a" stroke="#c9a84c" stroke-width="2.6" transform="rotate(45 16 16)"/>
    <g stroke="#f3ecdf" stroke-width="2" stroke-linecap="round">
      <path d="M16 12 V18"/>
      <path d="M10.5 18 H21.5"/>
      <path d="M10.5 18 V21"/>
      <path d="M21.5 18 V21"/>
    </g>
    <rect x="13.4" y="9.4" width="5.2" height="5.2" rx="1.3" ry="1.3" fill="#c9a84c" stroke="#f3ecdf" stroke-width="1.4" transform="rotate(45 16 12)"/>
    <rect x="8.2" y="18.7" width="4.6" height="4.6" rx="1.15" ry="1.15" fill="#f3ecdf" transform="rotate(45 10.5 21)"/>
    <rect x="19.2" y="18.7" width="4.6" height="4.6" rx="1.15" ry="1.15" fill="#f3ecdf" transform="rotate(45 21.5 21)"/>
  </g>

  <!-- Wordmark "Suimini" -->
  <text x="512" y="620" font-family="'Playfair Display', Georgia, serif"
        font-size="88" font-weight="700" fill="#f3ecdf"
        text-anchor="middle" letter-spacing="-1">Suimini</text>

  <!-- Tagline -->
  <text x="512" y="672" font-family="'IBM Plex Mono', 'Courier New', monospace"
        font-size="22" font-weight="500" fill="#c9a84c"
        text-anchor="middle" letter-spacing="3">MÉMOIRE FAMILIALE</text>

  <!-- Bottom rule -->
  <rect x="400" y="710" width="224" height="1" fill="#f3ecdf" opacity="0.16"/>
</svg>
