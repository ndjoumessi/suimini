<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- OG share image — Marine Deep + gold, mirrors the app/landing redesign
       (2026-07-14). Mark reuses BrandMark's exact seal geometry (scaled ×16
       from its 32-unit grid, centered above the wordmark), no emoji. -->
  <defs>
    <radialGradient id="bg" cx="50%" cy="0%" r="100%">
      <stop offset="0%" stop-color="#1e3040"/>
      <stop offset="70%" stop-color="#0f1a24"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Seal mark, centered ~x=600, scaled ×5 from Brand.tsx's 32-unit grid, shifted up -->
  <g transform="translate(440 90) scale(5)">
    <rect x="6.3" y="6.3" width="19.4" height="19.4" rx="4" ry="4" fill="#26374a" stroke="#c9a84c" stroke-width="2.6" transform="rotate(45 16 16)"/>
    <g stroke="#f3ecdf" stroke-width="2" stroke-linecap="round">
      <path d="M16 12 V18"/>
      <path d="M10.5 18 H21.5"/>
      <path d="M10.5 18 V21"/>
      <path d="M21.5 18 V21"/>
    </g>
    <rect x="13.4" y="9.4" width="5.2" height="5.2" rx="1.3" ry="1.3" fill="#c9a84c" stroke="#f3ecdf" stroke-width="1.4" transform="rotate(45 16 12)"/>
    <rect x="8.2" y="18.7" width="4.6" height="4.6" rx="1.15" ry="1.15" fill="#f3ecdf" transform="rotate(45 10.5 21)"/>
    <rect x="19.2" y="18.7" width="4.6" height="4.6" rx="1.15" ry="1.15" fill="#f3ecdf" transform="rotate(45 21.5 21)"/>
  </g>

  <text x="600" y="330" text-anchor="middle" font-family="Georgia, 'Playfair Display', serif" font-size="92" fill="#f3ecdf">Suimini</text>
  <text x="600" y="390" text-anchor="middle" font-family="Georgia, 'Playfair Display', serif" font-style="italic" font-size="34" fill="#c9a84c">Votre famille est un manuscrit vivant.</text>
  <text x="600" y="440" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="22" fill="#9aacba">L'arbre généalogique moderne — élégant, collaboratif, et toujours avec vous</text>
</svg>
