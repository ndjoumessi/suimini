<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 32 32">
  <!-- Maskable variant — full-bleed background (the OS applies its own mask shape,
       so no rounded corners here), content scaled to ~58% and centered to stay
       inside the ~80% safe zone under any mask (circle, squircle, teardrop…). -->
  <rect width="32" height="32" fill="#0f1a24"/>
  <g transform="translate(16 16) scale(0.6) translate(-16 -16)">
    <rect x="6.3" y="6.3" width="19.4" height="19.4" rx="4" ry="4" fill="#1e3040" stroke="#c9a84c" stroke-width="2.6" transform="rotate(45 16 16)"/>
    <g stroke="#f3ecdf" stroke-width="2" stroke-linecap="round">
      <path d="M16 12 V18"/>
      <path d="M10.5 18 H21.5"/>
      <path d="M10.5 18 V21"/>
      <path d="M21.5 18 V21"/>
    </g>
    <rect x="13.4" y="9.4" width="5.2" height="5.2" rx="1.3" ry="1.3" fill="#c9a84c" stroke="#f3ecdf" stroke-width="1.4" transform="rotate(45 16 12)"/>
    <rect x="8.2" y="18.7" width="4.6" height="4.6" rx="1.15" ry="1.15" fill="#f3ecdf" transform="rotate(45 10.5 21)"/>
    <rect x="19.2" y="18.7" width="4.6" height="4.6" rx="1.15" ry="1.15" fill="#f3ecdf" transform="rotate(45 21.5 21)"/>
  </g>
</svg>
